body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0a0f1e; color: #e2e8f0; min-height: 100vh; }
.app { max-width: 860px; margin: 0 auto; padding: 28px 16px; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
.header h1 { font-size: 24px; font-weight: 700; color: #f8fafc; }

/* Entry card */
.entry-card { background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.3); border-radius: 14px; padding: 20px; margin-bottom: 24px; }
.entry-card h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #6366f1; margin-bottom: 14px; }
.entry-row { display: flex; flex-direction: column; gap: 10px; align-items: stretch; }
.entry-group { display: flex; flex-direction: column; gap: 5px; }
.entry-group label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; }
.entry-group input, .entry-group select { font-family: inherit; font-size: 13px; color: #e2e8f0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 8px 12px; outline: none; width: 100%; box-sizing: border-box; }
.entry-group input:focus, .entry-group select:focus { border-color: #6366f1; }
.entry-group select option { background: #1e293b; }

.location-input { width: 220px; }
.type-select { }

/* Buttons */
.btn { font-family: inherit; cursor: pointer; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: #cbd5e1; transition: background 0.15s; }
.btn:hover { background: rgba(255,255,255,0.1); }
.btn-primary { background: linear-gradient(135deg,#1e40af,#6366f1); border-color: transparent; color: #fff; }
.btn-primary:hover { opacity: 0.88; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-danger { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3); color: #f87171; }

/* Stats */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; }
.stat-card h3 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-bottom: 12px; }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.stat-row:last-child { border-bottom: none; }
.stat-name { font-size: 13px; color: #cbd5e1; display: flex; align-items: center; gap: 6px; }
.stat-days { font-size: 13px; font-weight: 700; color: #f8fafc; }
.stat-pct { font-size: 11px; color: #475569; margin-left: 4px; }
.home-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; background: rgba(99,102,241,0.2); color: #818cf8; }

/* Summary strip */
.summary-strip { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.summary-pill { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; padding: 6px 16px; font-size: 12px; color: #94a3b8; }

.summary-pill.abroad { border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.06); }

.log-section h3 span { flex: 1; height: 1px; background: rgba(255,255,255,0.06); }

.year-btn.active { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.4); color: #818cf8; }

.empty { text-align: center; padding: 40px 0; color: #334155; font-size: 14px; }

.import-area { background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.12); border-radius: 10px; padding: 14px; margin-bottom: 20px; }

.import-hint { font-size: 11px; color: #475569; margin-top: 6px; }

.missing-pill { position: relative; cursor: pointer; user-select: none; }
.missing-pill.has-missing { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.08); }

// ── DB ───────────────────────────────────────────────────────────────────────
async function dbFetch(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": opts.prefer || "return=representation",
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) { const t = await res.text(); throw new Error(t); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadEntries() {
  const data = await dbFetch("location_entries?select=*&order=date.desc");
  return (data || []).map(r => ({ id: r.id, date: r.date, location: r.location, type: r.type || 'state' }));
}

async function saveEntry(entry) {
  return await dbFetch("location_entries", {
    method: "POST",
    prefer: "return=representation",
    headers: { "Prefer": "resolution=merge-duplicates,return=representation" },
    body: JSON.stringify({ id: entry.id, date: entry.date, location: entry.location, type: entry.type }),
  });
}

async function deleteEntry(id) {
  await dbFetch(`location_entries?id=eq.${id}`, { method: "DELETE", prefer: "return=minimal" });
}

// ── Computed ──────────────────────────────────────────────────────────────────
function getEntriesForPeriod(year, month = null) {
  return state.entries.filter(e => {
    const d = new Date(e.date + 'T12:00:00');
    if (d.getFullYear() !== year) return false;
    if (month !== null && d.getMonth() !== month) return false;
    return true;
  });
}

function getTotals(entries) {
  const map = {};
  entries.forEach(e => {
    const key = e.location;
    map[key] = (map[key] || 0) + 1;
  });
  return Object.entries(map).sort((a,b) => b[1]-a[1]).map(([loc, days]) => ({ loc, days }));
}

function getAbroadDays(entries) {
  return entries.filter(e => e.type === 'abroad').length;
}

function el(tag, attrs={}, text='') {

}

// ── Gap Checker ──────────────────────────────────────────────────────────
function checkAndShowGaps(lastLoggedDate) {
  const yr = new Date(lastLoggedDate + 'T12:00:00').getFullYear();
  const start = new Date(yr, 0, 1);
  const end = new Date(lastLoggedDate + 'T12:00:00');
  const loggedDates = new Set(state.entries.filter(e => {
    const d = new Date(e.date + 'T12:00:00');
    return d.getFullYear() === yr;
  }).map(e => e.date));
  const missing = [];
  for(let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
    const s = d.toISOString().slice(0,10);
    if(!loggedDates.has(s)) missing.push(s);
  }
  if(missing.length === 0) return;
  state._missingDays = missing;
  state._showGapWarning = true;
}

  const monthTabs = div({class:'month-tabs'});
  MONTHS.forEach((m, i) => {
    const tab = el('button',{class:'month-tab'+(state.selectedMonth===i?' active':'')});
    tab.textContent = m;
    tab.onclick = () => { state.selectedMonth = i; render(); };
    monthTabs.appendChild(tab);
  });
  app.appendChild(monthTabs);

  // Import section
  const importToggle = btn('btn-sm', state.showImport ? '▲ Hide Import' : '⬆ Import Historical Data', () => {
    state.showImport = !state.showImport; render();
  });
  importToggle.style.marginBottom = "16px";
  app.appendChild(importToggle);

  if(state.showImport) {
    const importArea = div({class:'import-area'});
    importArea.appendChild(el('h3',{},'Paste Historical Data'));
    const importHint = div({class:'import-hint'});
    importHint.innerHTML = 'Format: one entry per line: <code>YYYY-MM-DD, STATE_OR_COUNTRY, state|abroad</code><br>Example: <code>2025-01-15, CA, state</code> or <code>2025-06-10, France, abroad</code>';
    importArea.appendChild(importHint);
    const ta = el('textarea',{placeholder:'2025-01-01, CA, state\n2025-01-02, CA, state\n2025-01-03, NY, state\n...'});
    ta.value = state.importText;
    ta.oninput = e => { state.importText = e.target.value; };
    importArea.appendChild(ta);
    const importBtn = btn('btn-primary btn-sm', 'Import', async () => {
      const lines = state.importText.split('\n').map(l=>l.trim()).filter(Boolean);
      let count = 0, errors = 0;
      for(const line of lines) {
        const parts = line.split(',').map(p=>p.trim());
        if(parts.length<2) { errors++; continue; }
        const [date, loc, type='state'] = parts;
        if(!/^\d{4}-\d{2}-\d{2}$/.test(date)) { errors++; continue; }
        try {
          await saveEntry({ id: uid(), date, location: loc.toUpperCase(), type: type.toLowerCase() });
          count++;
        } catch(e) { errors++; }
      }
      state.entries = await loadEntries();
      state.importText = '';
      state.showImport = false;
      showToast(`✅ Imported ${count} entries${errors?' ('+errors+' errors)':''}`);
      render();
    });
    importArea.appendChild(importBtn);
    app.appendChild(importArea);
  }

  // Log entries for selected month
  const logSection = div({class:'log-section'});
  const logHeader = el('h3');
  logHeader.innerHTML = `${MONTHS[state.selectedMonth]} ${state.selectedYear} Log <span></span>`;
  logSection.appendChild(logHeader);

  const monthEntries = getEntriesForPeriod(state.selectedYear, state.selectedMonth)
    .sort((a,b) => b.date.localeCompare(a.date));

  const SHOW_LIMIT = 3;
  const visibleEntries = state.showAllEntries ? monthEntries : monthEntries.slice(0, SHOW_LIMIT);
  if(monthEntries.length===0) {
    logSection.appendChild(div({class:'empty'},'No entries for this month'));
  } else {
    visibleEntries.forEach(entry => {
      const row = div({class:'log-entry'});
      row.appendChild(div({class:'log-date'}, entry.date));
      row.appendChild(div({class:'log-location'}, entry.type==='abroad' ? '🌍 '+entry.location : '📍 '+(STATE_NAMES[entry.location]||entry.location)));
      const typeBadge = span({class:'log-type '+(entry.type==='abroad'?'type-abroad':'type-state')});
      typeBadge.textContent = entry.type==='abroad' ? 'Abroad' : 'US';
      row.appendChild(typeBadge);
      const acts = div({class:'log-actions'});
      const delBtn = btn('btn-sm btn-danger','✕', async () => {
        await deleteEntry(entry.id);
        state.entries = state.entries.filter(e=>e.id!==entry.id);
        render();
      });
      acts.appendChild(delBtn);
      row.appendChild(acts);
      logSection.appendChild(row);
    });
    if(monthEntries.length > SHOW_LIMIT) {
      const toggleBtn = btn('btn-sm', state.showAllEntries ? '▲ Show Less' : `▼ Show More (${monthEntries.length - SHOW_LIMIT} more)`, () => {
        state.showAllEntries = !state.showAllEntries; render();
      });
      toggleBtn.style.marginTop = '8px';
      logSection.appendChild(toggleBtn);
    }
  }
  app.appendChild(logSection);
  root.appendChild(app);
}

// ── Init ──────────────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = [['date','location','type']];
  state.entries.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(e => {
    rows.push([e.date, e.location, e.type]);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'location-tracker-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

async function init() {
  // Handle ?date= query param from daily email link
  const params = new URLSearchParams(window.location.search);
  if(params.get('date')) {
    // Pre-fill date on load — handled in render
    window._prefilledDate = params.get('date');
  }

  state.loading = true;
  render();
  try {
    await ensureTable();
    const [entries] = await Promise.all([loadEntries(), loadSettings()]);
    state.entries = entries;
  } catch(e) {
    console.error(e);
    state.entries = [];
  }
  state.loading = false;
  render();

  // Pre-fill date if passed via query param
  if(window._prefilledDate) {
    const di = document.querySelector('input[type=date]');
    if(di) di.value = window._prefilledDate;
  }
}

async function ensureTable() {
  // Try to query the table; if it fails we need the user to create it
  try {
    await dbFetch("location_entries?select=id&limit=1");
  } catch(e) {
    console.warn("Table may not exist yet:", e.message);
  }
}

init();
</script>
